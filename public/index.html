<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.tailwindcss.com"></script>
  <title id="pageTitle">Google</title>
  <style>
    body { font-family: 'Segoe UI', Arial, sans-serif; font-size: 13px; }
    /* Excel Styling */
    .excel-grid td { border: 0.5px solid #d1d1d1; height: 25px; padding: 0 8px; }
    /* GitHub Styling */
    .gh-code { font-family: 'ui-monospace', 'SFMono-Regular', Menlo, Monaco, Consolas, monospace; }
    
    /* Scrollbar */
    #messageContainer::-webkit-scrollbar { width: 4px; }
    #messageContainer::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }

    /* Hide Desktop Views on Mobile */
    @media (max-width: 768px) {
      .desktop-only { display: none !important; }
      #mobileChatView { display: flex !important; }
    }
  </style>
</head>
<body class="bg-white flex flex-col h-screen overflow-hidden">

  <div id="loginOverlay" class="fixed inset-0 bg-white flex flex-col items-center justify-center z-50">
    <div class="flex flex-col items-center w-full max-w-[584px] px-4 -mt-32">
      <div class="mb-8 scale-75 md:scale-100">
        <span class="text-7xl font-medium tracking-tight">
          <span class="text-[#4285F4]">G</span><span class="text-[#EA4335]">o</span><span class="text-[#FBBC05]">o</span><span class="text-[#4285F4]">g</span><span class="text-[#34A853]">l</span><span class="text-[#EA4335]">e</span>
        </span>
      </div>
      <div class="w-full relative group">
        <div class="flex items-center w-full h-[46px] border border-gray-200 rounded-full px-4 hover:shadow-md focus-within:shadow-md transition-shadow">
          <input type="text" id="secretCode" class="flex-1 outline-none text-gray-800 text-base px-2" placeholder="Search Google or type a URL" autocomplete="off">
        </div>
      </div>
      <div class="mt-8 flex gap-3">
        <button id="loginBtn" class="bg-[#f8f9fa] border border-[#f8f9fa] px-4 py-2 text-sm text-[#3c4043] rounded">Google Search</button>
      </div>
      <p id="errorMsg" class="text-red-500 text-xs mt-4 hidden italic"></p>
    </div>
  </div>

  <div id="excelView" class="hidden desktop-only flex-col h-full">
    <div class="bg-[#217346] text-white flex items-center h-8 px-3 shrink-0">
      <span class="font-bold mr-4">Excel</span>
      <span class="text-[11px] opacity-80">Inventory_Update.xlsx</span>
    </div>
    <div class="bg-white border-b border-gray-300 flex items-center h-9 px-2 gap-2">
      <div class="text-gray-400 italic px-2">fx</div>
      <input type="text" id="excelFormula" class="flex-1 h-full text-sm outline-none" placeholder="Enter data...">
    </div>
    <div class="flex-1 overflow-auto bg-[#f3f3f3]">
      <table class="border-collapse w-full bg-white text-[11px]">
        <thead>
          <tr class="bg-[#f3f3f3] text-gray-500">
            <td class="border border-gray-300 w-10"></td>
            <td class="border border-gray-300 w-32">A (Timestamp)</td>
            <td class="border border-gray-300 w-32">B (User)</td>
            <td class="border border-gray-300">C (Remarks)</td>
          </tr>
        </thead>
        <tbody id="excelRows" class="excel-grid"></tbody>
      </table>
    </div>
  </div>

  <div id="githubView" class="hidden desktop-only flex-col h-full bg-[#0d1117] text-[#e6edf3]">
    <div class="bg-[#161b22] p-4 border-b border-[#30363d] flex justify-between items-center">
      <span class="font-semibold text-sm">main.py</span>
    </div>
    <div class="flex-1 overflow-auto p-4 gh-code text-sm leading-relaxed" id="githubContent"></div>
    <div class="p-4 border-t border-[#30363d] flex gap-2">
      <span class="text-[#7d8590]">>>></span>
      <input type="text" id="githubInput" class="bg-transparent flex-1 outline-none text-white">
    </div>
  </div>

  <div id="mobileChatView" class="hidden flex-col h-full bg-[#efeae2]">
    <div class="bg-[#075e54] text-white p-4 flex items-center gap-3 shadow-md shrink-0">
      <div class="w-10 h-10 bg-gray-300 rounded-full overflow-hidden flex items-center justify-center text-gray-600 font-bold">U</div>
      <div>
        <div class="font-bold text-base" id="mobileTitle">Workspace</div>
        <div class="text-[11px] opacity-80">online</div>
      </div>
    </div>
    
    <div id="mobileMessages" class="flex-1 overflow-y-auto p-4 space-y-4 flex flex-col">
      </div>

    <div class="p-2 bg-[#f0f0f0] flex gap-2 items-center shrink-0">
      <input type="text" id="mobileInput" class="flex-1 bg-white rounded-full px-4 py-2 outline-none shadow-sm text-sm" placeholder="Type a message">
      <button id="mobileSendBtn" class="bg-[#128c7e] text-white w-10 h-10 rounded-full flex items-center justify-center shadow-md">
        <svg class="w-5 h-5 rotate-90" fill="currentColor" viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
      </button>
    </div>
  </div>

  <script>
    const ws = new WebSocket(`${location.protocol === 'https:' ? 'wss:' : 'ws:'}//${location.host}`);
    let myCode = '';
    let currentUsername = '';

    const attemptLogin = () => {
      myCode = document.getElementById('secretCode').value.trim();
      ws.send(JSON.stringify({ type: 'auth', code: myCode }));
    };

    document.getElementById('loginBtn').addEventListener('click', attemptLogin);
    document.getElementById('secretCode').addEventListener('keypress', (e) => { if(e.key === 'Enter') attemptLogin(); });

    ws.onmessage = (event) => {
      const data = JSON.parse(event.data);

      if (data.type === 'auth-success') {
        document.getElementById('loginOverlay').classList.add('hidden');
        currentUsername = data.username;
        document.getElementById('mobileTitle').innerText = "System Sync: " + data.username;
        
        if (myCode === '0907') {
          document.getElementById('excelView').classList.remove('hidden');
          initExcel();
        } else {
          document.getElementById('githubView').classList.remove('hidden');
        }
        if (data.messageHistory) data.messageHistory.forEach(msg => renderMessage(msg));
      }

      if (data.type === 'message') renderMessage(data);
    };

    function renderMessage(data) {
      const time = new Date(data.timestamp).toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit' });
      const isMe = data.username === currentUsername;

      // 1. Render for Excel
      const row = document.createElement('tr');
      row.innerHTML = `<td class="bg-gray-100 border text-center text-[10px] text-gray-400">#</td><td class="border px-2 text-[10px] text-gray-400">${time}</td><td class="border px-2 font-bold">${data.username}</td><td class="border px-2 text-gray-700 bg-yellow-50/20">${data.text}</td>`;
      document.getElementById('excelRows').appendChild(row);

      // 2. Render for GitHub
      const line = document.createElement('div');
      line.innerHTML = `<span class="text-[#7d8590]"># [${time}]</span> <span class="text-[#ff7b72]">${data.username}</span>: <span class="text-[#a5d6ff]">"${data.text}"</span>`;
      document.getElementById('githubContent').appendChild(line);

      // 3. Render for Mobile (WhatsApp Bubbles)
      const bubble = document.createElement('div');
      bubble.className = `max-w-[80%] p-2 rounded-lg text-sm shadow-sm relative ${isMe ? 'bg-[#dcf8c6] self-end' : 'bg-white self-start'}`;
      bubble.innerHTML = `
        <div class="text-[10px] font-bold text-gray-500 mb-1">${data.username}</div>
        <div>${data.text}</div>
        <div class="text-[9px] text-gray-400 text-right mt-1">${time}</div>
      `;
      document.getElementById('mobileMessages').appendChild(bubble);
      
      // Auto scroll
      const mobileContainer = document.getElementById('mobileMessages');
      mobileContainer.scrollTop = mobileContainer.scrollHeight;
    }

    // Input Handlers
    const send = (val) => { if(val) ws.send(JSON.stringify({ type: 'message', text: val })); };

    document.getElementById('excelFormula').addEventListener('keypress', (e) => { if(e.key === 'Enter') { send(e.target.value); e.target.value = ''; }});
    document.getElementById('githubInput').addEventListener('keypress', (e) => { if(e.key === 'Enter') { send(e.target.value); e.target.value = ''; }});
    document.getElementById('mobileInput').addEventListener('keypress', (e) => { if(e.key === 'Enter') { send(e.target.value); e.target.value = ''; }});
    document.getElementById('mobileSendBtn').addEventListener('click', () => { 
      const inp = document.getElementById('mobileInput');
      send(inp.value); inp.value = ''; 
    });

    function initExcel() {
      const body = document.getElementById('excelRows');
      for(let i=1; i<=15; i++) {
        const tr = document.createElement('tr');
        tr.innerHTML = `<td class="bg-gray-50 border text-center text-[10px]"></td><td class="border"></td><td class="border"></td><td class="border"></td>`;
        body.appendChild(tr);
      }
    }

    window.addEventListener('keydown', (e) => { if(e.key === 'Escape') location.reload(); });
  </script>
</body>
</html>
