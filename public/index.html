<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.tailwindcss.com"></script>
  <title id="pageTitle">Google</title>
  <style>
    body { font-family: 'Segoe UI', Arial, sans-serif; font-size: 13px; }
    /* Excel Styling */
    .excel-grid td { border: 0.5px solid #d1d1d1; height: 25px; padding: 0 8px; }
    /* GitHub Styling */
    .gh-code { font-family: 'ui-monospace', 'SFMono-Regular', Menlo, Monaco, Consolas, monospace; }
    #messageContainer::-webkit-scrollbar { width: 6px; }
    #messageContainer::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
  </style>
</head>
<body class="bg-white flex flex-col h-screen overflow-hidden">

  <div id="loginOverlay" class="fixed inset-0 bg-white flex flex-col items-center justify-center z-50">
    <div class="flex flex-col items-center w-full max-w-[584px] px-4 -mt-32">
      <div class="mb-8">
        <span class="text-7xl font-medium tracking-tight">
          <span class="text-[#4285F4]">G</span><span class="text-[#EA4335]">o</span><span class="text-[#FBBC05]">o</span><span class="text-[#4285F4]">g</span><span class="text-[#34A853]">l</span><span class="text-[#EA4335]">e</span>
        </span>
      </div>
      
      <div class="w-full relative group">
        <div class="flex items-center w-full h-[46px] border border-gray-200 rounded-full px-4 hover:shadow-md focus-within:shadow-md transition-shadow">
          <svg class="h-5 w-5 text-gray-400 mr-3" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
          </svg>
          <input type="text" id="secretCode" class="flex-1 outline-none text-gray-800 text-base" autocomplete="off">
          <div class="flex items-center gap-3">
            <svg class="h-5 w-5 text-[#4285F4]" viewBox="0 0 24 24"><path fill="currentColor" d="M12,14A3,3 0 0,1 9,11C9,10.5 9.12,10.03 9.32,9.6L12,4L14.68,9.6C14.88,10.03 15,10.5 15,11A3,3 0 0,1 12,14M12,2A10,10 0 0,0 2,12A10,10 0 0,0 12,22A10,10 0 0,0 22,12A10,10 0 0,0 12,2Z" /></svg>
            <svg class="h-5 w-5 text-[#4285F4]" viewBox="0 0 24 24"><path fill="currentColor" d="M15,9H9V15H15V9M12,2A10,10 0 0,0 2,12A10,10 0 0,0 12,22A10,10 0 0,0 22,12A10,10 0 0,0 12,2Z" /></svg>
          </div>
        </div>
      </div>

      <div class="mt-8 flex gap-3">
        <button id="loginBtn" class="bg-[#f8f9fa] border border-[#f8f9fa] hover:border-[#dadce0] px-4 py-2 text-sm text-[#3c4043] rounded focus:outline-none">Google Search</button>
        <button class="bg-[#f8f9fa] border border-[#f8f9fa] hover:border-[#dadce0] px-4 py-2 text-sm text-[#3c4043] rounded focus:outline-none">I'm Feeling Lucky</button>
      </div>
      <p id="errorMsg" class="text-red-500 text-xs mt-4 hidden italic"></p>
    </div>
  </div>

  <div id="excelView" class="hidden flex flex-col h-full">
    <div class="bg-[#217346] text-white flex items-center h-8 shrink-0 px-3 justify-between">
      <div class="flex items-center gap-4">
        <span class="font-bold">Excel</span>
        <span class="text-[11px] opacity-80">Monthly_Audit_Log_Q1.xlsx</span>
      </div>
    </div>
    <div class="bg-white border-b border-gray-300 flex items-center h-9 shrink-0 px-2 gap-2">
      <div class="text-gray-400 italic px-2 font-serif text-sm">fx</div>
      <input type="text" id="excelFormula" class="flex-1 h-full text-sm outline-none" placeholder="Ready">
    </div>
    <div class="flex-1 overflow-auto bg-[#f3f3f3]">
      <table class="border-collapse w-full bg-white">
        <thead>
          <tr class="bg-[#f3f3f3] text-center text-gray-500 text-[11px]">
            <td class="border border-gray-300 w-10"></td>
            <td class="border border-gray-300 w-32">A (Timestamp)</td>
            <td class="border border-gray-300 w-32">B (Source)</td>
            <td class="border border-gray-300">C (Log_Details)</td>
          </tr>
        </thead>
        <tbody id="excelRows" class="excel-grid"></tbody>
      </table>
    </div>
  </div>

  <div id="githubView" class="hidden flex flex-col h-full bg-[#0d1117] text-[#e6edf3]">
    <div class="bg-[#161b22] p-4 border-b border-[#30363d] flex justify-between items-center">
      <div class="flex items-center gap-3">
        <svg height="24" viewBox="0 0 16 16" width="24" fill="white"><path d="M8 0c4.42 0 8 3.58 8 8a8.013 8.013 0 0 1-5.45 7.59c-.4.08-.55-.17-.55-.38 0-.27.01-1.13.01-2.2 0-.75-.25-1.23-.54-1.48 1.78-.2 3.65-.88 3.65-3.95 0-.88-.31-1.59-.82-2.15.08-.2.36-1.02-.08-2.12 0 0-.67-.22-2.2.82-.64-.18-1.32-.27-2-.27-.68 0-1.36.09-2 .27-1.53-1.03-2.2-.82-2.2-.82-.44 1.1-.16 1.92-.08 2.12-.51.56-.82 1.28-.82 2.15 0 3.06 1.86 3.75 3.64 3.95-.23.2-.44.55-.51 1.07-.46.21-1.61.55-2.33-.66-.15-.24-.6-.83-1.23-.82-.67.01-.27.38.01.53.34.19.73.9.82 1.13.16.45.68 1.31 2.69.94 0 .67.01 1.3.01 1.49 0 .21-.15.45-.55.38A7.995 7.995 0 0 1 0 8c0-4.42 3.58-8 8-8Z"></path></svg>
        <span class="font-semibold text-sm">main_controller.py</span>
      </div>
      <div class="text-xs text-[#7d8590]">Locked by dev_07</div>
    </div>
    <div class="flex-1 overflow-auto p-4 gh-code text-sm leading-relaxed" id="githubContent"></div>
    <div class="p-4 border-t border-[#30363d] flex gap-2 items-center">
      <span class="text-[#7d8590] ml-2">>>></span>
      <input type="text" id="githubInput" class="bg-transparent flex-1 outline-none text-white placeholder-[#30363d]" placeholder="Append to source code...">
    </div>
  </div>

  <script>
    const loginOverlay = document.getElementById('loginOverlay');
    const excelView = document.getElementById('excelView');
    const githubView = document.getElementById('githubView');
    const secretCodeInput = document.getElementById('secretCode');
    const errorMsg = document.getElementById('errorMsg');

    let currentView = ''; 
    let myCode = '';

    // WebSocket Init
    const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
    const ws = new WebSocket(`${protocol}//${window.location.host}`);

    const attemptLogin = () => {
      myCode = secretCodeInput.value.trim();
      ws.send(JSON.stringify({ type: 'auth', code: myCode }));
    };

    document.getElementById('loginBtn').addEventListener('click', attemptLogin);
    secretCodeInput.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') attemptLogin();
    });

    ws.onmessage = (event) => {
      const data = JSON.parse(event.data);

      if (data.type === 'auth-success') {
        loginOverlay.classList.add('hidden');
        if (myCode === '0907') {
          currentView = 'excel';
          excelView.classList.remove('hidden');
          document.title = "Monthly_Audit_Log_Q1.xlsx";
          initExcel();
        } else {
          currentView = 'github';
          githubView.classList.remove('hidden');
          document.title = "main_controller.py";
        }
        if (data.messageHistory) data.messageHistory.forEach(msg => renderMessage(msg));
      }

      if (data.type === 'auth-error') {
        errorMsg.innerText = data.message;
        errorMsg.classList.remove('hidden');
      }

      if (data.type === 'message') renderMessage(data);
    };

    function renderMessage(data) {
      const time = new Date(data.timestamp).toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit' });
      if (currentView === 'excel') {
        const row = document.createElement('tr');
        row.innerHTML = `
          <td class="bg-[#f3f3f3] border border-gray-300 text-center text-[10px] text-gray-400">#</td>
          <td class="border border-gray-300 text-gray-400 text-[10px]">${time}</td>
          <td class="border border-gray-300 font-bold text-gray-600">${data.username}</td>
          <td class="border border-gray-300 text-gray-700 bg-yellow-50/20">${data.text}</td>
        `;
        document.getElementById('excelRows').appendChild(row);
      } else {
        const line = document.createElement('div');
        line.innerHTML = `<span class="text-[#7d8590]"># [${time}]</span> <span class="text-[#ff7b72]">${data.username}</span><span class="text-[#e6edf3]">.log(</span><span class="text-[#a5d6ff]">"${data.text}"</span><span class="text-[#e6edf3]">)</span>`;
        document.getElementById('githubContent').appendChild(line);
      }
      window.scrollTo(0, document.body.scrollHeight);
    }

    const handleInput = (e, inputId) => {
      if (e.key === 'Enter') {
        const val = document.getElementById(inputId).value;
        if (val) {
          ws.send(JSON.stringify({ type: 'message', text: val }));
          document.getElementById(inputId).value = '';
        }
      }
    };

    document.getElementById('excelFormula').addEventListener('keypress', (e) => handleInput(e, 'excelFormula'));
    document.getElementById('githubInput').addEventListener('keypress', (e) => handleInput(e, 'githubInput'));

    function initExcel() {
      const body = document.getElementById('excelRows');
      for(let i=1; i<=20; i++) {
        const tr = document.createElement('tr');
        tr.innerHTML = `<td class="bg-[#f3f3f3] border border-gray-300 text-center text-[10px] text-gray-400">${i}</td><td class="border border-gray-300"></td><td class="border border-gray-300"></td><td class="border border-gray-300"></td>`;
        body.appendChild(tr);
      }
    }

    window.addEventListener('keydown', (e) => { if (e.key === 'Escape') location.reload(); });
  </script>
</body>
</html>
