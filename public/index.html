<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.tailwindcss.com"></script>
  <title>Task</title>
</head>
<body class="bg-gray-900 text-gray-100">
  <!-- Todo App Screen -->
  <div id="todoScreen" class="min-h-screen w-full p-8 bg-gray-900">
    <div class="w-full h-full max-w-7xl mx-auto">
      <div class="text-center mb-8">
        <h1 id="titleHeader" class="text-4xl font-bold text-gray-100 mb-2 cursor-pointer hover:text-gray-300 transition-colors">My Tasks</h1>
        <p class="text-gray-500 text-sm">Stay organized</p>
      </div>

      <div class="flex gap-3 mb-8 max-w-2xl mx-auto">
        <input type="text" id="todoInput" placeholder="Add a new task..." class="flex-1 px-4 py-3 border border-gray-800 rounded-lg bg-gray-800 text-gray-100 placeholder-gray-600 focus:outline-none focus:ring-2 focus:ring-gray-700 shadow-sm">
        <button id="addBtn" class="bg-gray-800 hover:bg-gray-700 text-gray-100 px-6 py-3 rounded-lg font-bold transition-colors shadow-md text-lg">+</button>
      </div>

      <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-6" id="todosList"></div>

      <div id="emptyState" class="text-center py-16">
        <p class="text-gray-600 text-lg">No tasks yet. Add one to get started! 🚀</p>
      </div>
    </div>
  </div>

  <!-- Secret Code Modal -->
  <div id="secretModal" class="hidden fixed inset-0 bg-black bg-opacity-50 z-50 flex items-end justify-end">
    <div class="bg-gray-900 rounded-xl shadow-2xl w-72 p-5 relative border border-gray-800 m-6">
      <button class="absolute top-3 right-3 text-gray-600 hover:text-gray-500 text-xl" id="closeModalBtn">&times;</button>
      <h2 class="text-lg font-bold text-gray-100 mb-1">Access Code</h2>
      <p class="text-gray-600 text-xs mb-4">Enter your code</p>
      
      <input type="password" id="secretCode" class="w-full px-3 py-2 border border-gray-800 rounded-lg bg-gray-800 text-gray-100 placeholder-gray-600 focus:outline-none focus:ring-2 focus:ring-gray-700 mb-3 text-center text-sm tracking-widest" placeholder="••••" maxlength="4">
      <button id="submitCodeBtn" class="w-full bg-gray-800 hover:bg-gray-700 text-gray-100 py-2 rounded-lg font-semibold transition-colors text-sm mb-2">Enter</button>
      
      <div id="codeError" class="hidden text-red-500 text-xs text-center"></div>
    </div>
  </div>

  <!-- Chat Widget - Bottom Right Corner -->
  <div id="chatWidget" class="fixed bottom-4 right-4 w-80 h-96 md:w-80 md:h-96 sm:w-full sm:h-screen sm:bottom-0 sm:right-0 sm:rounded-none bg-gray-900 rounded-2xl shadow-2xl flex flex-col z-40 hidden border border-gray-800 md:border-gray-800 sm:border-0">
    <div id="chatScreen" class="flex flex-col h-full">
      <!-- Chat Header -->
      <div class="bg-gray-900 text-gray-100 p-4 rounded-t-2xl flex items-center justify-between border-b border-gray-800">
        <div class="flex-1">
          <h3 class="font-semibold text-sm">Chat</h3>
          <div class="flex items-center gap-2 text-xs mt-1">
            <span id="otherUserStatus" class="flex items-center gap-1">
              <span class="w-2 h-2 bg-gray-700 rounded-full"></span>
              Offline
            </span>
          </div>
        </div>
        <button id="logoutBtn" class="text-gray-500 hover:text-gray-400 p-2 rounded-lg transition-colors text-xs font-semibold">Exit</button>
      </div>

      <!-- Messages -->
      <div class="messages-container flex-1 overflow-y-auto p-4 space-y-3 bg-gray-900" id="messages"></div>

      <!-- Input Area -->
      <div class="border-t border-gray-800 p-3 flex gap-2 rounded-b-2xl bg-gray-900">
        <input type="text" id="messageInput" placeholder="Type message..." class="flex-1 px-3 py-2 border border-gray-800 rounded-lg bg-gray-800 text-gray-100 placeholder-gray-600 text-sm focus:outline-none focus:ring-2 focus:ring-gray-700">
        <button id="sendButton" class="bg-gray-800 hover:bg-gray-700 text-gray-100 px-3 py-2 rounded-lg text-sm font-semibold transition-colors">Send</button>
      </div>
    </div>
  </div>

  <!-- Chat Toggle Button (Bottom Right) -->
  <button id="chatToggleBtn" class="fixed bottom-6 right-6 z-30 hidden">
    <div class="w-12 h-12 bg-gray-800 hover:bg-gray-700 text-gray-100 rounded-full shadow-lg flex items-center justify-center text-xl transition-all hover:scale-110">
      💬
    </div>
  </button>

  <script>
    // ==============================================
    // TODO APP LOGIC
    // ==============================================
    const todoInput = document.getElementById('todoInput');
    const addBtn = document.getElementById('addBtn');
    const todosList = document.getElementById('todosList');
    const emptyState = document.getElementById('emptyState');
    const titleHeader = document.getElementById('titleHeader');
    
    let todos = [];
    let clickCount = 0;
    let clickTimer = null;

    // Load todos from localStorage
    function loadTodos() {
      const saved = localStorage.getItem('todos');
      if (saved) {
        todos = JSON.parse(saved);
        renderTodos();
      }
    }

    // Save todos to localStorage
    function saveTodos() {
      localStorage.setItem('todos', JSON.stringify(todos));
    }

    // Render todos
    function renderTodos() {
      todosList.innerHTML = '';
      if (todos.length === 0) {
        emptyState.style.display = 'block';
      } else {
        emptyState.style.display = 'none';
      }

      const stickyColors = [
        'bg-gray-800',
        'bg-slate-800', 
        'bg-zinc-800',
        'bg-stone-800',
        'bg-gray-700',
        'bg-slate-700'
      ];

      todos.forEach((todo, index) => {
        const colorClass = stickyColors[index % stickyColors.length];
        const rotation = (index % 2 === 0 ? '-rotate-1' : 'rotate-1');
        
        const todoItem = document.createElement('div');
        todoItem.className = `sticky-note ${colorClass} ${rotation} p-6 rounded-lg shadow-md hover:shadow-xl transition-all cursor-pointer relative group min-h-40 flex flex-col ${todo.completed ? 'opacity-40' : ''}`;
        todoItem.innerHTML = `
          <div class="flex-1 break-words text-base font-medium text-gray-200 ${todo.completed ? 'line-through text-gray-500' : ''}">
            ${escapeHtml(todo.text)}
          </div>
          <div class="flex gap-2 pt-3 opacity-0 group-hover:opacity-100 transition-opacity">
            <input type="checkbox" class="todo-checkbox w-5 h-5 text-gray-400 rounded cursor-pointer" ${todo.completed ? 'checked' : ''}>
            <button class="delete-btn text-gray-400 hover:text-gray-300 text-sm font-bold ml-auto">✕</button>
          </div>
        `;

        todoItem.querySelector('.todo-checkbox').addEventListener('change', () => {
          todos[index].completed = !todos[index].completed;
          saveTodos();
          renderTodos();
        });

        todoItem.querySelector('.delete-btn').addEventListener('click', () => {
          todos.splice(index, 1);
          saveTodos();
          renderTodos();
        });

        todosList.appendChild(todoItem);
      });
    }

    function addTodo() {
      const text = todoInput.value.trim();
      if (text === '') return;

      todos.push({ text, completed: false });
      saveTodos();
      renderTodos();
      todoInput.value = '';
      todoInput.focus();
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    // Event listeners untuk todo
    addBtn.addEventListener('click', addTodo);
    todoInput.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') {
        addTodo();
      }
    });

    // Double click title untuk buka secret code modal
    titleHeader.addEventListener('click', () => {
      clickCount++;
      clearTimeout(clickTimer);
      clickTimer = setTimeout(() => {
        clickCount = 0;
      }, 500);

      if (clickCount === 2) {
        showSecretModal();
        clickCount = 0;
      }
    });

    // ==============================================
    // SECRET CODE MODAL
    // ==============================================
    const secretModal = document.getElementById('secretModal');
    const secretCodeInput = document.getElementById('secretCode');
    const submitCodeBtn = document.getElementById('submitCodeBtn');
    const closeModalBtn = document.getElementById('closeModalBtn');
    const codeError = document.getElementById('codeError');

    function showSecretModal() {
      secretModal.classList.remove('hidden');
      secretCodeInput.value = '';
      codeError.textContent = '';
      codeError.classList.add('hidden');
      secretCodeInput.focus();
    }

    function hideSecretModal() {
      secretModal.classList.add('hidden');
    }

    closeModalBtn.addEventListener('click', hideSecretModal);

    secretModal.addEventListener('click', (e) => {
      if (e.target === secretModal) {
        hideSecretModal();
      }
    });

    submitCodeBtn.addEventListener('click', handleCodeSubmit);
    secretCodeInput.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') {
        e.preventDefault();
        handleCodeSubmit();
      }
    });

    function handleCodeSubmit() {
      const code = secretCodeInput.value.trim();
      if (!code) {
        showCodeError('Enter code');
        return;
      }

      ws.send(JSON.stringify({
        type: 'auth',
        code: code
      }));
      hideSecretModal();
    }

    function showCodeError(message) {
      codeError.textContent = message;
      codeError.classList.remove('hidden');
    }

    // ==============================================
    // CHAT LOGIC
    // ==============================================
    const todoScreen = document.getElementById('todoScreen');
    const chatWidget = document.getElementById('chatWidget');
    const chatToggleBtn = document.getElementById('chatToggleBtn');
    const messagesDiv = document.getElementById('messages');
    const messageInput = document.getElementById('messageInput');
    const sendButton = document.getElementById('sendButton');
    const otherUserStatus = document.getElementById('otherUserStatus');
    const logoutBtn = document.getElementById('logoutBtn');
    
    let currentUsername = null;
    let currentUserId = null;
    let otherUsername = null;
    let otherUserId = null;
    let isAuthenticated = false;

    // Chat toggle
    chatToggleBtn.addEventListener('click', () => {
      chatWidget.classList.toggle('hidden');
      messageInput.focus();
    });

    logoutBtn.addEventListener('click', () => {
      isAuthenticated = false;
      currentUsername = null;
      currentUserId = null;
      todoScreen.style.display = 'flex';
      chatWidget.classList.add('hidden');
      chatToggleBtn.classList.add('hidden');
      messagesDiv.innerHTML = '';
      ws.close();
      location.reload();
    });

    // WebSocket
    const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
    const wsUrl = `${protocol}//${window.location.host}`;
    const ws = new WebSocket(wsUrl);

    ws.addEventListener('open', () => {
      console.log('Connected');
    });

    ws.addEventListener('message', (event) => {
      try {
        const data = JSON.parse(event.data);
        handleMessage(data);
      } catch (error) {
        console.error('Error parsing message:', error);
      }
    });

    ws.addEventListener('error', (error) => {
      console.error('WebSocket error:', error);
    });

    function handleMessage(data) {
      switch (data.type) {
        case 'welcome':
          console.log(data.message);
          break;

        case 'auth-success':
          isAuthenticated = true;
          currentUsername = data.username;
          currentUserId = data.userId;
          
          chatWidget.classList.remove('hidden');
          chatToggleBtn.classList.remove('hidden');
          messageInput.focus();

          if (data.messageHistory && data.messageHistory.length > 0) {
            displaySystemMessage(`📜 ${data.messageHistory.length} previous messages`);
            data.messageHistory.forEach(msg => {
              const isSender = msg.userId === currentUserId;
              displayMessage(msg.username, msg.text, msg.timestamp, isSender);
            });
          }
          break;

        case 'auth-error':
          showCodeError(data.message);
          break;

        case 'message':
          const isSender = data.userId === currentUserId;
          displayMessage(data.username, data.text, data.timestamp, isSender);
          break;

        case 'user-joined':
          if (data.username !== currentUsername) {
            otherUsername = data.username;
            updateOtherUserStatus(true);
          }
          displaySystemMessage(`${data.username} online`);
          break;

        case 'user-left':
          if (data.username !== currentUsername) {
            updateOtherUserStatus(false);
          }
          displaySystemMessage(`${data.username} offline`);
          break;

        case 'error':
          displaySystemMessage(`Error: ${data.message}`);
          break;
      }
    }

    function updateOtherUserStatus(isOnline) {
      if (otherUsername) {
        if (isOnline) {
          otherUserStatus.innerHTML = `<span class="w-2 h-2 bg-gray-600 rounded-full inline-block"></span> ${otherUsername}`;
        } else {
          otherUserStatus.innerHTML = `<span class="w-2 h-2 bg-gray-800 rounded-full inline-block"></span> ${otherUsername}`;
        }
      }
    }

    sendButton.addEventListener('click', sendMessage);
    messageInput.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') {
        e.preventDefault();
        sendMessage();
      }
    });

    function sendMessage() {
      const message = messageInput.value.trim();
      if (message && ws.readyState === WebSocket.OPEN && isAuthenticated) {
        ws.send(JSON.stringify({
          type: 'message',
          text: message
        }));
        messageInput.value = '';
        messageInput.focus();
      }
    }

    function displayMessage(username, text, timestamp, isSender = false) {
      const messageContainer = document.createElement('div');
      messageContainer.className = isSender ? 'flex justify-end gap-2' : 'flex justify-start gap-2';
      
      const messageElement = document.createElement('div');
      messageElement.className = isSender 
        ? 'bg-gray-800 text-gray-100 px-3 py-2 rounded-lg max-w-xs text-sm'
        : 'bg-gray-700 text-gray-100 px-3 py-2 rounded-lg max-w-xs text-sm';
      
      const textElement = document.createElement('div');
      textElement.textContent = text;
      messageElement.appendChild(textElement);
      
      messageContainer.appendChild(messageElement);
      messagesDiv.appendChild(messageContainer);
      
      messagesDiv.scrollTop = messagesDiv.scrollHeight;
    }

    function displaySystemMessage(text) {
      const messageContainer = document.createElement('div');
      messageContainer.className = 'flex justify-center py-2';
      
      const messageElement = document.createElement('div');
      messageElement.className = 'text-gray-600 text-xs bg-gray-900 px-3 py-1 rounded-full';
      messageElement.textContent = text;
      
      messageContainer.appendChild(messageElement);
      messagesDiv.appendChild(messageContainer);
      
      messagesDiv.scrollTop = messagesDiv.scrollHeight;
    }

    // Load todos on page load
    loadTodos();
  </script>
</body>
</html>
